name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  static-analysis:
    name: Static Analysis (MISRA C 2012)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install cppcheck
        run: sudo apt-get update && sudo apt-get install -y cppcheck

      - name: Run MISRA C 2012 analysis
        run: |
          cppcheck --enable=all \
                   --suppress=missingIncludeSystem \
                   --inline-suppr \
                   --addon=misra \
                   --error-exitcode=1 \
                   --output-file=cppcheck-report.txt \
                   --xml \
                   -Iinc \
                   src/ inc/ test/
          echo "=== MISRA C 2012 Analysis Report ==="
          cat cppcheck-report.txt

      - name: Upload analysis report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: misra-analysis-report
          path: cppcheck-report.txt

  build-and-test:
    name: Build and test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install build tools
        run: sudo apt-get update && sudo apt-get install -y build-essential

      - name: Build and run mode logic tests
        run: |
          gcc -Wall -Wextra -Werror -Iinc -o test_mode_logic src/mode_logic.c test/test_mode_logic.c
          ./test_mode_logic

